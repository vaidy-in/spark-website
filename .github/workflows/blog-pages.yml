# Deploy marketing site to GitHub Pages. This file lives under marketing/ so it is included
# when pushing git subtree --prefix=marketing to the standalone GitHub marketing repo.
# Repo Settings → Pages → Source: GitHub Actions.
# Set repository variable MARKETING_SITE_URL (trailing slash), e.g. https://www.sparktutor.ai/

name: Deploy marketing to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:marketing:css

      - name: Generate static blog and site output
        env:
          BLOG_POSTS_URL: https://getblogposts-eyyuwkjlza-uc.a.run.app
        run: |
          DEFAULT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          MARKETING_SITE_URL="${{ vars.MARKETING_SITE_URL }}"
          if [ -n "$MARKETING_SITE_URL" ]; then
            export SITE_URL="$MARKETING_SITE_URL"
          else
            export SITE_URL="$DEFAULT_URL"
          fi
          node scripts/generate-blog-pages.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .site-output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
